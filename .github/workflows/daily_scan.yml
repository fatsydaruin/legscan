name: Manual Stock Movers Scan

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to scan (YYYY-MM-DD) - khali chodo to aaj ki date use hogi'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -z "${{ github.event.inputs.date }}" ]; then
            python main.py
          else
            python main.py ${{ github.event.inputs.date }}
          fi

      - name: Upload CSV as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: movers-csv
          path: output/*.csv
          if-no-files-found: ignore
